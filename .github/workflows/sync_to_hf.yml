name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ]  # Tomar Github branch name jodi 'master' hoy, tobe master likhbe

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Renerfia:$HF_TOKEN@huggingface.co/spaces/Renerfia/Red_Flag_Analyzer main